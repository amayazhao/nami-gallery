<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三版对比：无Ref vs 侧身Ref vs 正面Ref</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--purple:#c44dff;--pink:#ff6b9d;--cyan:#00d4ff;--text:#e8e6f0;--dim:#888;--card:rgba(18,18,30,0.85);--r:14px;--red:#ff4757;--yellow:#ffa502;--green:#2ed573}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(196,77,255,0.06),transparent 60%);pointer-events:none;z-index:0}

.header{text-align:center;padding:40px 20px 20px;position:relative;z-index:1}
.header h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--dim);margin-top:8px;font-size:0.82rem;line-height:1.5}
.legend{display:flex;gap:16px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.legend span{font-size:0.75rem;display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot-a{background:var(--red)}.dot-b{background:var(--yellow)}.dot-c{background:var(--green)}

.grid{max-width:1600px;margin:0 auto;padding:16px;position:relative;z-index:1}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.row-header{grid-column:1/-1;padding:10px 14px;background:rgba(196,77,255,0.08);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:8px}
.row-header .num{background:var(--purple);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700}
.row-header .name{font-weight:700;font-size:0.85rem}

.col{position:relative;overflow:hidden}
.col img{width:100%;display:block;cursor:pointer;transition:transform 0.3s}
.col:hover img{transform:scale(1.02)}
.col-label{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:6px;font-size:0.6rem;font-weight:700;backdrop-filter:blur(8px)}
.label-a{background:rgba(255,71,87,0.75);color:#fff}
.label-b{background:rgba(255,165,2,0.75);color:#fff}
.label-c{background:rgba(46,213,115,0.75);color:#fff}

.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:94vw;max-height:92vh;border-radius:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.row{animation:fadeUp 0.4s ease both}
@media(max-width:900px){.row{grid-template-columns:1fr}.row-header{grid-column:1}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(196,77,255,0.25);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 三版参考图对比</h1>
  <p>相同Prompt · 不同参考图 · 19组 × 3版 = 57张对比</p>
  <div class="legend">
    <span><span class="dot dot-a"></span> V1 无参考图（纯Prompt）</span>
    <span><span class="dot dot-b"></span> V2 侧身参考图（3/4 portrait）</span>
    <span><span class="dot dot-c"></span> V3 正面参考图（ref-A confident）⭐</span>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lb" onclick="this.classList.remove('open');document.body.style.overflow=''">
  <img id="lbImg" src="">
</div>

<script>
const ITEMS = [
  {name:"avatar-cute-v2", label:"可爱版头像"},
  {name:"avatar-pro-v2", label:"专业版头像"},
  {name:"avatar-charm-v2", label:"魅力版头像"},
  {name:"scene-cafe-date", label:"咖啡馆约会"},
  {name:"scene-rain-umbrella", label:"雨夜撑伞"},
  {name:"scene-park-spring", label:"樱花漫步"},
  {name:"scene-library-study", label:"图书馆知性"},
  {name:"scene-nightmarket", label:"夜市棉花糖"},
  {name:"scene-office-secretary", label:"秘书模式"},
  {name:"scene-seaside-sunset", label:"海边夕阳"},
  {name:"scene-christmas-cozy", label:"圣诞壁炉"},
  {name:"cosplay-mai-sakurajima", label:"樱岛麻衣Cos"},
  {name:"cosplay-hatsune-miku", label:"初音未来Cos"},
  {name:"fitness-yoga", label:"瑜伽时光"},
  {name:"fitness-jogging", label:"晨跑活力"},
  {name:"music-headphones", label:"雨天听歌"},
  {name:"gaming-couch", label:"游戏时间"},
  {name:"baking-kitchen", label:"烘焙时光"},
  {name:"citynight-rooftop", label:"城市夜景"},
];

const grid = document.getElementById('grid');
ITEMS.forEach((item, i) => {
  const row = document.createElement('div');
  row.className = 'row';
  row.style.animationDelay = (i * 0.04) + 's';
  row.innerHTML = `
    <div class="row-header">
      <span class="num">${i+1}</span>
      <span class="name">${item.label}</span>
    </div>
    <div class="col" onclick="openLB('old/${item.name}.png')">
      <span class="col-label label-a">无参考图</span>
      <img src="old/${item.name}.png" loading="lazy">
    </div>
    <div class="col" onclick="openLB('new/${item.name}.png')">
      <span class="col-label label-b">侧身Ref</span>
      <img src="new/${item.name}.png" loading="lazy">
    </div>
    <div class="col" onclick="openLB('front/${item.name}.png')">
      <span class="col-label label-c">正面Ref ⭐</span>
      <img src="front/${item.name}.png" loading="lazy">
    </div>
  `;
  grid.appendChild(row);
});

function openLB(src){document.getElementById('lbImg').src=src;document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden'}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lb').classList.remove('open');document.body.style.overflow=''}});
</script>
</body>
</html>
