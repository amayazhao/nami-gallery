<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP 10 Anime Girl Portrait Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0a0a12;--bg-card:rgba(18,18,30,0.85);--bg-glass:rgba(255,255,255,0.03);
  --purple:#c44dff;--purple-dim:rgba(196,77,255,0.15);--pink:#ff6b9d;--cyan:#00d4ff;
  --gold:#f5a623;--text:#e8e6f0;--text-dim:#888;--radius:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(196,77,255,0.08),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,107,157,0.06),transparent 60%);pointer-events:none;z-index:0}

/* Top Nav */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,18,0.92);backdrop-filter:blur(20px);padding:14px 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(196,77,255,0.15)}
.top-nav a{color:var(--purple);text-decoration:none;font-size:0.9rem;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.top-nav a:hover{color:var(--pink)}
.top-nav .sep{color:rgba(255,255,255,0.15)}
.top-nav .title{font-size:0.9rem;color:var(--text-dim);font-weight:500}
.nav-back{display:none}

/* Hero */
.hero{text-align:center;padding:120px 24px 48px;position:relative;z-index:1}
.hero h1{font-size:2.6rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.02em}
.hero .sub{color:var(--text-dim);margin-top:12px;font-size:1.05rem;line-height:1.6}
.hero .sub em{color:var(--purple);font-style:normal;font-weight:600}
.hero .badge{display:inline-block;margin-top:16px;padding:6px 18px;border-radius:20px;background:var(--purple-dim);border:1px solid rgba(196,77,255,0.25);color:var(--purple);font-size:0.8rem;font-weight:600;letter-spacing:0.04em}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:0 28px 80px;max-width:1400px;margin:0 auto;position:relative;z-index:1}
.card{background:var(--bg-card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.35s cubic-bezier(.4,0,.2,1);position:relative}
.card:hover{transform:translateY(-6px);border-color:rgba(196,77,255,0.35);box-shadow:0 20px 60px rgba(196,77,255,0.12)}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:transform 0.5s}
.card:hover .card-img{transform:scale(1.04)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(10,10,18,0.95));pointer-events:none}
.card-rank{position:absolute;top:14px;left:14px;background:rgba(10,10,18,0.75);backdrop-filter:blur(8px);border:1px solid rgba(196,77,255,0.3);color:var(--purple);font-size:0.75rem;font-weight:800;padding:5px 10px;border-radius:8px;letter-spacing:0.04em}
.card-name{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.card-name-en{font-size:0.78rem;color:var(--text-dim);font-weight:400}
.card-anime{font-size:0.75rem;color:var(--pink);margin-top:6px;opacity:0.85}
.card-vibe{font-size:0.7rem;color:var(--text-dim);margin-top:4px;font-style:italic}
.card-arrow{position:absolute;top:14px;right:14px;background:rgba(196,77,255,0.2);backdrop-filter:blur(8px);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(-8px);transition:all 0.3s}
.card:hover .card-arrow{opacity:1;transform:translateX(0)}
.card-arrow svg{width:16px;height:16px;stroke:var(--purple);fill:none;stroke-width:2}

/* Detail View */
.detail{display:none;padding:100px 28px 80px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
.detail.active{display:block}
.detail-header{display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap;margin-bottom:40px}
.detail-portrait{width:300px;border-radius:var(--radius);overflow:hidden;border:2px solid rgba(196,77,255,0.2);flex-shrink:0;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.detail-portrait img{width:100%;display:block}
.detail-info{flex:1;min-width:260px}
.detail-info h2{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.detail-info .en-name{font-size:1rem;color:var(--text-dim);margin-top:2px}
.detail-info .anime-tag{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:12px;background:rgba(255,107,157,0.12);border:1px solid rgba(255,107,157,0.25);color:var(--pink);font-size:0.8rem}
.detail-info .vibe-tag{display:inline-block;margin-top:8px;margin-left:6px;padding:4px 14px;border-radius:12px;background:var(--purple-dim);border:1px solid rgba(196,77,255,0.25);color:var(--purple);font-size:0.8rem;font-style:italic}

/* Feature Table */
.feat-table{margin-top:20px;width:100%;font-size:0.85rem}
.feat-table tr{border-bottom:1px solid rgba(255,255,255,0.04)}
.feat-table td{padding:8px 0}
.feat-table td:first-child{color:var(--purple);font-weight:600;width:60px;text-transform:uppercase;font-size:0.72rem;letter-spacing:0.08em;vertical-align:top;padding-top:10px}
.feat-table td:last-child{color:var(--text);line-height:1.5}

/* Scene Section */
.scene-title{font-size:1.5rem;font-weight:700;margin:40px 0 24px;position:relative;padding-left:18px}
.scene-title::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:4px;border-radius:2px;background:linear-gradient(to bottom,var(--purple),var(--pink))}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;margin-bottom:40px}
.scene-card{background:var(--bg-card);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.06);transition:border-color 0.3s}
.scene-card:hover{border-color:rgba(196,77,255,0.25)}
.scene-card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;cursor:pointer;transition:transform 0.4s}
.scene-card:hover img{transform:scale(1.02)}
.scene-meta{padding:16px 18px}
.scene-label{font-size:0.95rem;font-weight:600;display:flex;align-items:center;gap:8px}
.scene-label .icon{font-size:1.1rem}
.scene-prompt-toggle{margin-top:10px;color:var(--purple);font-size:0.78rem;cursor:pointer;display:flex;align-items:center;gap:4px;transition:color 0.2s;user-select:none}
.scene-prompt-toggle:hover{color:var(--pink)}
.scene-prompt{display:block;margin-top:10px;padding:12px;background:rgba(0,0,0,0.3);border-radius:10px;font-size:0.75rem;line-height:1.65;color:var(--text-dim);word-break:break-word;border:1px solid rgba(255,255,255,0.04);max-height:200px;overflow-y:auto}
.scene-prompt.closed{display:none}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:90vh;border-radius:12px;box-shadow:0 20px 80px rgba(0,0,0,0.6)}
.lightbox-close{position:absolute;top:20px;right:24px;color:#fff;font-size:1.8rem;cursor:pointer;opacity:0.6;transition:opacity 0.2s;z-index:501}
.lightbox-close:hover{opacity:1}

/* Responsive */
@media(max-width:768px){
  .hero h1{font-size:1.8rem}
  .grid{grid-template-columns:repeat(2,1fr);gap:14px;padding:0 14px 60px}
  .detail-header{flex-direction:column}
  .detail-portrait{width:100%;max-width:360px}
  .scene-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(196,77,255,0.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(196,77,255,0.4)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.5s ease both}
.card:nth-child(2){animation-delay:0.05s}.card:nth-child(3){animation-delay:0.1s}
.card:nth-child(4){animation-delay:0.15s}.card:nth-child(5){animation-delay:0.2s}
.card:nth-child(6){animation-delay:0.25s}.card:nth-child(7){animation-delay:0.3s}
.card:nth-child(8){animation-delay:0.35s}.card:nth-child(9){animation-delay:0.4s}
.card:nth-child(10){animation-delay:0.45s}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="../../index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Nami Gallery
  </a>
  <span class="sep">|</span>
  <span class="title">TOP 10 Anime Girl Portraits</span>
  <a href="#" class="nav-back" id="navBack" onclick="showGrid();return false;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Gallery
  </a>
</nav>

<!-- Home Grid View -->
<div id="homeView">
  <div class="hero">
    <h1>TOP 10 Anime Girl Portraits</h1>
    <p class="sub">Pure <em>visual-feature-driven</em> generation &mdash; no character names in prompts<br>
    Powered by MiniMax image-01 &middot; 10 characters &times; 4 images each</p>
    <span class="badge">CONSISTENCY TEST &middot; 40 IMAGES</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- Detail View -->
<div class="detail" id="detailView"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="data.js"></script>
<script>
const grid = document.getElementById('grid');
const homeView = document.getElementById('homeView');
const detailView = document.getElementById('detailView');
const navBack = document.getElementById('navBack');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

// Build grid
CHARACTERS.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => showDetail(c.id);
  card.innerHTML = `
    <img class="card-img" src="${c.portrait}" alt="${c.nameCn}" loading="lazy">
    <span class="card-rank">#${String(i+1).padStart(2,'0')}</span>
    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
    <div class="card-overlay">
      <div class="card-name">${c.nameCn}</div>
      <div class="card-name-en">${c.nameEn}</div>
      <div class="card-anime">${c.anime}</div>
      <div class="card-vibe">${c.vibe}</div>
    </div>
  `;
  grid.appendChild(card);
});

function showDetail(id) {
  const c = CHARACTERS.find(x => x.id === id);
  if (!c) return;
  
  const featRows = Object.entries(c.features).map(([k,v]) => 
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');
  
  const sceneCards = c.scenes.map((s, i) => {
    const meta = SCENE_LABELS[s.id] || { label: s.label, icon: '', color: '#888' };
    return `
      <div class="scene-card">
        <img src="${s.file}" alt="${s.label}" loading="lazy" onclick="openLightbox('${s.file}')">
        <div class="scene-meta">
          <div class="scene-label">
            <span class="icon">${meta.icon}</span>
            <span>${meta.label}</span>
          </div>
          <div class="scene-prompt-toggle" onclick="this.nextElementSibling.classList.toggle('closed');this.querySelector('.arrow').textContent=this.nextElementSibling.classList.contains('closed')?'\u25BC':'\u25B2'">
            <span class="arrow">\u25B2</span>&nbsp;Prompt
          </div>
          <div class="scene-prompt">${s.prompt}</div>
        </div>
      </div>
    `;
  }).join('');
  
  detailView.innerHTML = `
    <div class="detail-header">
      <div class="detail-portrait">
        <img src="${c.portrait}" alt="${c.nameCn}" onclick="openLightbox('${c.portrait}')">
      </div>
      <div class="detail-info">
        <h2>${c.nameCn}</h2>
        <div class="en-name">${c.nameEn}</div>
        <span class="anime-tag">${c.anime}</span>
        <span class="vibe-tag">${c.vibe}</span>
        <table class="feat-table"><tbody>${featRows}</tbody></table>
      </div>
    </div>
    <div class="scene-title">Scene Consistency Test</div>
    <div class="scene-grid">${sceneCards}</div>
  `;
  
  homeView.style.display = 'none';
  detailView.classList.add('active');
  navBack.style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'instant' });
  location.hash = 'char-' + id;
}

function showGrid() {
  homeView.style.display = '';
  detailView.classList.remove('active');
  detailView.innerHTML = '';
  navBack.style.display = 'none';
  location.hash = '';
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (lightbox.classList.contains('open')) closeLightbox();
    else if (detailView.classList.contains('active')) showGrid();
  }
});

// Handle hash on load
if (location.hash.startsWith('#char-')) {
  const id = location.hash.replace('#char-', '');
  showDetail(id);
}
</script>
</body>
</html>
