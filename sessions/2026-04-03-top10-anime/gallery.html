<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP10角色一致性验证馆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #0b0d14;
    color: #e8ecff;
    min-height: 100vh;
  }
  a { color: inherit; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 99;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(11,13,20,0.92);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }
  .btn {
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.04);
    color: #d8deff;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
  }
  .btn:hover { background: rgba(255,255,255,0.09); }
  .title {
    font-size: 15px;
    color: #9fb0ff;
    font-weight: 600;
  }

  .hero {
    padding: 26px 18px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(140deg, #1b1432, #0e172e 55%, #111820);
  }
  .hero h1 {
    font-size: 30px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff7fb1, #b39dff, #7fb3ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    color: #b8c0e8;
    font-size: 14px;
    line-height: 1.7;
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 12px;
  }
  .stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    min-width: 110px;
  }
  .stat .n { font-size: 22px; color: #d7b1ff; font-weight: 700; }
  .stat .l { font-size: 12px; color: #a4add7; margin-top: 2px; }

  .wrap {
    max-width: 1240px;
    margin: 20px auto 40px;
    padding: 0 16px;
  }

  /* Home list */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  .card {
    background: #12182a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
    transition: 0.25s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(104, 96, 255, 0.2);
  }
  .card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 12px;
  }
  .name-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .name-cn { font-size: 20px; font-weight: 700; color: #fff; }
  .name-en { font-size: 12px; color: #9ea8d5; }
  .anime { font-size: 12px; color: #b98cff; margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag {
    font-size: 11px;
    color: #cfd6ff;
    background: rgba(185,140,255,0.18);
    border: 1px solid rgba(185,140,255,0.35);
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* Detail */
  .detail {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .detail { grid-template-columns: 1fr; }
  }
  .panel {
    background: #12182a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
  }
  .panel-head {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: #b8c0e8;
    background: rgba(255,255,255,0.03);
  }
  .portrait-box img {
    width: 100%;
    display: block;
    aspect-ratio: 3/4;
    object-fit: cover;
    cursor: zoom-in;
  }
  .meta {
    padding: 14px;
  }
  .meta h2 {
    margin-bottom: 6px;
    font-size: 26px;
  }
  .meta .sub { color: #9ea8d5; font-size: 13px; margin-bottom: 6px; }
  .meta .desc { color: #bfc8f5; font-size: 13px; line-height: 1.7; }

  .scene-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 12px;
  }
  @media (max-width: 900px) {
    .scene-grid { grid-template-columns: 1fr; }
  }
  .scene-card {
    background: #0e1425;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
  }
  .scene-card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
  }
  .scene-info { padding: 10px; }
  .scene-info .sname { font-size: 14px; font-weight: 700; color: #f4f6ff; }
  .scene-info .sdesc { font-size: 12px; color: #a9b2dc; margin-top: 4px; line-height: 1.6; }

  .hint {
    margin-top: 12px;
    color: #9ea8d5;
    font-size: 12px;
    line-height: 1.7;
    padding: 10px 12px;
    border: 1px dashed rgba(255,255,255,0.18);
    border-radius: 10px;
  }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(180, 127, 255, 0.3);
  }

  .empty {
    text-align: center;
    color: #a4add7;
    padding: 30px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="btn" href="../../index.html">← 返回写真馆</a>
    <button class="btn" id="backListBtn" style="display:none;">← 返回TOP10列表</button>
    <div class="title" id="pageTitle">TOP10角色一致性验证馆</div>
  </div>

  <section class="hero">
    <h1>TOP 10 角色一致性验证</h1>
    <p>
      第一层是角色形象图（Identity Portrait），用于锚定“她是谁”；
      第二层是3个验证场景（Cafe / Rainy Street / Rooftop），用于检查“换场景后还是不是她”。
      点击首页角色卡片进入二级详情页查看场景图。
    </p>
    <div class="stats">
      <div class="stat"><div class="n">10</div><div class="l">角色</div></div>
      <div class="stat"><div class="n">40</div><div class="l">总图数</div></div>
      <div class="stat"><div class="n">10 + 30</div><div class="l">形象图 + 场景图</div></div>
      <div class="stat"><div class="n">100%</div><div class="l">场景图完成率</div></div>
    </div>
  </section>

  <main class="wrap" id="app"></main>

  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="" alt="preview" />
  </div>

<script>
const SCENES = {
  "a-cafe": { label: "Scene A · Cafe Afternoon", desc: "暖色室内+近景，测试五官与发型稳定性" },
  "b-rain": { label: "Scene B · Rainy Street", desc: "冷色雨夜+全身，测试体型与气质保持" },
  "c-rooftop": { label: "Scene C · Rooftop Sunset", desc: "夕阳风吹场景，测试神态与氛围一致性" }
};

const CHARS = [
  { id: "01", cn: "樱岛麻衣", en: "Mai Sakurajima", anime: "青春猪头少年不会梦到兔女郎学姐", portrait: "01-mai-sakurajima.png", tags: ["黑长直", "紫蓝瞳", "清冷"], anchor: "黑长直 + 紫蓝瞳 + 冷静眼神" },
  { id: "02", cn: "亚丝娜", en: "Asuna Yuuki", anime: "刀剑神域 SAO", portrait: "02-asuna-yuuki.png", tags: ["栗橙长发", "骑士感", "温柔坚毅"], anchor: "栗橙长发 + 亲和力表情" },
  { id: "03", cn: "薇尔莉特", en: "Violet Evergarden", anime: "紫罗兰永恒花园", portrait: "03-violet-evergarden.png", tags: ["金发", "蓝瞳", "优雅"], anchor: "金发低马尾 + 宝蓝瞳 + 人偶感" },
  { id: "04", cn: "零二", en: "Zero Two", anime: "DARLING in the FRANXX", portrait: "04-zero-two.png", tags: ["粉发", "红角", "野性"], anchor: "粉发 + 红角 + 俏皮侵略感" },
  { id: "05", cn: "蕾姆", en: "Rem", anime: "Re:从零开始的异世界生活", portrait: "05-rem.png", tags: ["天蓝短发", "遮眼", "温柔"], anchor: "天蓝短发遮眼 + 软萌表情" },
  { id: "06", cn: "御坂美琴", en: "Mikoto Misaka", anime: "某科学的超电磁炮", portrait: "06-mikoto-misaka.png", tags: ["栗色短发", "元气", "运动感"], anchor: "栗色短发 + 活力感" },
  { id: "07", cn: "牧濑红莉栖", en: "Kurisu Makise", anime: "命运石之门", portrait: "07-kurisu-makise.png", tags: ["赤栗长发", "呆毛", "知性"], anchor: "赤栗发 + 呆毛 + 理性傲娇" },
  { id: "08", cn: "灶门祢豆子", en: "Nezuko Kamado", anime: "鬼灭之刃", portrait: "08-nezuko-kamado.png", tags: ["黑橙渐变", "粉瞳", "柔和"], anchor: "黑橙渐变发 + 粉瞳 + 安静气质" },
  { id: "09", cn: "芙莉莲", en: "Frieren", anime: "葬送的芙莉莲", portrait: "09-frieren.png", tags: ["银白发", "尖耳", "空灵"], anchor: "银白长发 + 绿瞳 + 精灵耳" },
  { id: "10", cn: "女版五条悟", en: "Gojo (Female)", anime: "咒术回战（性转）", portrait: "10-gojo-satoru-female-ver..png", tags: ["白炸毛", "冰蓝瞳", "强气"], anchor: "白发 + 冰蓝瞳 + 绝对自信" }
];

function sceneFile(charId, sceneId) {
  return `${charId}-${sceneId}.png`;
}

function openLightbox(src) {
  const box = document.getElementById("lightbox");
  document.getElementById("lightboxImg").src = src;
  box.classList.add("active");
}

function renderHome() {
  document.getElementById("backListBtn").style.display = "none";
  document.getElementById("pageTitle").textContent = "TOP10角色一致性验证馆";

  const cards = CHARS.map(c => `
    <article class="card">
      <img src="./${c.portrait}" alt="${c.cn}" loading="lazy" onclick="openLightbox('./${c.portrait}')">
      <div class="card-body">
        <div class="name-row"><div class="name-cn">${c.cn}</div><div class="name-en">${c.en}</div></div>
        <div class="anime">${c.anime}</div>
        <div class="tags">${c.tags.map(t => `<span class='tag'>${t}</span>`).join("")}</div>
        <button class="btn" style="width:100%;" onclick="goDetail('${c.id}')">查看场景验证页</button>
      </div>
    </article>
  `).join("");

  document.getElementById("app").innerHTML = `<section class="grid">${cards}</section>`;
}

function renderDetail(id) {
  const c = CHARS.find(x => x.id === id);
  if (!c) {
    document.getElementById("app").innerHTML = `<div class='empty'>角色不存在</div>`;
    return;
  }

  document.getElementById("backListBtn").style.display = "inline-block";
  document.getElementById("pageTitle").textContent = `${c.cn} · 场景一致性验证`;

  const sceneCards = Object.keys(SCENES).map(sceneId => {
    const s = SCENES[sceneId];
    const file = sceneFile(c.id, sceneId);
    return `
      <div class="scene-card">
        <img src="./${file}" alt="${c.cn}-${sceneId}" loading="lazy" onclick="openLightbox('./${file}')">
        <div class="scene-info">
          <div class="sname">${s.label}</div>
          <div class="sdesc">${s.desc}</div>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("app").innerHTML = `
    <section class="detail">
      <div class="panel portrait-box">
        <div class="panel-head">Identity Portrait（形象锚点图）</div>
        <img src="./${c.portrait}" alt="${c.cn}" onclick="openLightbox('./${c.portrait}')">
      </div>

      <div class="panel">
        <div class="panel-head">Consistency Scenes（跨场景一致性）</div>
        <div class="meta">
          <h2>${c.cn}</h2>
          <div class="sub">${c.en} · ${c.anime}</div>
          <div class="desc">核心身份锚点：${c.anchor}</div>
          <div class="hint">
            观察建议：先看左侧形象图，再看右侧3个场景，重点看发型/发色、眼神、脸型与整体气质是否保持同一角色。
          </div>
        </div>
        <div class="scene-grid">${sceneCards}</div>
      </div>
    </section>
  `;
}

function goDetail(id) {
  location.hash = `char-${id}`;
}

function router() {
  const hash = location.hash || "";
  if (hash.startsWith("#char-")) {
    renderDetail(hash.replace("#char-", ""));
  } else {
    renderHome();
  }
}

document.getElementById("backListBtn").addEventListener("click", () => {
  location.hash = "";
});

window.addEventListener("hashchange", router);
router();
</script>
</body>
</html>
