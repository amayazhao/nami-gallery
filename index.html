<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💅 娜美写真馆 — Nami's Gallery</title>
<style>
/* ===== CSS Variables & Reset ===== */
:root {
  --primary: #4a6fa5;
  --primary-light: #6b8fc5;
  --primary-dark: #2d4a73;
  --accent: #ff8c42;
  --accent-light: #ffaa6b;
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-card-hover: #1c2333;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-bright: #ffffff;
  --border: #30363d;
  --gradient-nami: linear-gradient(135deg, #1a2a4a 0%, #0d1117 50%, #1a1a2e 100%);
  --gradient-accent: linear-gradient(135deg, var(--accent) 0%, #ff6b6b 100%);
  --shadow-glow: 0 0 20px rgba(74, 111, 165, 0.3);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary-dark); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ===== Hero Section ===== */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--gradient-nami);
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('sessions/2026-04-03-daily-cover/cover-daily.png') center/cover no-repeat;
  opacity: 0.15;
  filter: blur(8px);
  z-index: 0;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(74, 111, 165, 0.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(255, 140, 66, 0.08) 0%, transparent 50%);
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(2%, -2%) rotate(1deg); }
  50% { transform: translate(-1%, 2%) rotate(-1deg); }
  75% { transform: translate(1%, -1%) rotate(0.5deg); }
}

/* Particles */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--primary-light);
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 4s ease-in-out infinite;
}

@keyframes sparkle {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  50% { opacity: 0.8; transform: translateY(-40px) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0); }
}

.hero-avatar {
  position: relative;
  z-index: 2;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--accent);
  box-shadow: 0 0 40px rgba(255, 140, 66, 0.4), 0 0 80px rgba(74, 111, 165, 0.2);
  animation: avatar-pulse 3s ease-in-out infinite;
  cursor: pointer;
  transition: transform 0.3s;
}

.hero-avatar:hover {
  transform: scale(1.05);
}

@keyframes avatar-pulse {
  0%, 100% { box-shadow: 0 0 40px rgba(255, 140, 66, 0.4), 0 0 80px rgba(74, 111, 165, 0.2); }
  50% { box-shadow: 0 0 60px rgba(255, 140, 66, 0.6), 0 0 100px rgba(74, 111, 165, 0.3); }
}

.hero-title {
  position: relative;
  z-index: 2;
  font-size: 3rem;
  font-weight: 800;
  margin-top: 24px;
  background: linear-gradient(135deg, var(--text-bright) 0%, var(--primary-light) 50%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 2px;
}

.hero-subtitle {
  position: relative;
  z-index: 2;
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-top: 12px;
  font-style: italic;
}

.hero-stats {
  position: relative;
  z-index: 2;
  display: flex;
  gap: 40px;
  margin-top: 32px;
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 4px;
}

.scroll-hint {
  position: absolute;
  bottom: 30px;
  z-index: 2;
  animation: bounce 2s ease-in-out infinite;
  cursor: pointer;
}

.scroll-hint svg {
  width: 28px;
  height: 28px;
  fill: var(--text-dim);
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* ===== Navigation Tabs ===== */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13, 17, 23, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 56px;
}

.nav-logo {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  margin-right: 24px;
  white-space: nowrap;
}

.nav-tab {
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 0.9rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid transparent;
  white-space: nowrap;
  user-select: none;
}

.nav-tab:hover {
  color: var(--text);
  background: var(--bg-card);
}

.nav-tab.active {
  color: var(--accent);
  background: rgba(255, 140, 66, 0.1);
  border-color: rgba(255, 140, 66, 0.3);
}

/* ===== Content Container ===== */
.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

.section-title {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-desc {
  color: var(--text-dim);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* ===== Section: Portraits ===== */
.portraits-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.portrait-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.portrait-card:hover {
  transform: translateY(-8px);
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}

.portrait-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  transition: transform 0.5s;
}

.portrait-card:hover img {
  transform: scale(1.05);
}

.portrait-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  font-weight: 600;
}

.portrait-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  margin-top: 6px;
}

.tag-cute { background: rgba(255, 154, 158, 0.3); color: #ff9a9e; }
.tag-sexy { background: rgba(255, 107, 107, 0.3); color: #ff6b6b; }
.tag-pro { background: rgba(74, 111, 165, 0.3); color: var(--primary-light); }

/* ===== Section: Sessions ===== */
.sessions-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.session-card {
  display: flex;
  gap: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s;
}

.session-card:hover {
  border-color: var(--primary);
  background: var(--bg-card-hover);
  box-shadow: var(--shadow-glow);
}

.session-cover {
  width: 200px;
  height: 200px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  flex-shrink: 0;
}

.session-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.session-date {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}

.session-name {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.session-meta {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-bottom: 12px;
}

.session-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.session-tag {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.8rem;
  background: rgba(74, 111, 165, 0.2);
  color: var(--primary-light);
}

.session-tag.cosplay {
  background: rgba(255, 140, 66, 0.2);
  color: var(--accent);
}

.session-tag.private {
  background: rgba(255, 107, 107, 0.2);
  color: #ff6b6b;
}

.session-card.featured {
  border: 2px solid var(--accent);
  background: linear-gradient(135deg, rgba(255, 140, 66, 0.08) 0%, var(--bg-card) 100%);
  position: relative;
}

.session-card.featured::before {
  content: '⭐ 门面写真';
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--gradient-accent);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 12px;
  z-index: 1;
}

/* ===== Gallery View (Story Reader) ===== */
.gallery-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1000;
  overflow-y: auto;
}

.gallery-overlay.active {
  display: block;
}

.gallery-close {
  position: fixed;
  top: 20px;
  right: 24px;
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.gallery-close:hover {
  background: rgba(255,255,255,0.2);
}

.gallery-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

.gallery-header {
  text-align: center;
  margin-bottom: 48px;
}

.gallery-header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
}

.gallery-header p {
  color: var(--text-dim);
}

.chapter {
  margin-bottom: 64px;
  animation: fadeInUp 0.6s ease-out forwards;
  opacity: 0;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.chapter-img-wrapper {
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.chapter-img {
  width: 100%;
  display: block;
  cursor: zoom-in;
  transition: transform 0.4s;
}

.chapter-img:hover {
  transform: scale(1.02);
}

.chapter-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
}

.chapter-text {
  color: var(--text);
  line-height: 1.8;
  font-size: 1rem;
}

.chapter-text em {
  color: var(--primary-light);
  font-style: italic;
}

.chapter-text strong {
  color: var(--accent);
}

.chapter-divider {
  width: 60px;
  height: 2px;
  background: var(--gradient-accent);
  margin: 48px auto;
  border-radius: 1px;
}

/* ===== Lightbox ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.97);
  z-index: 2000;
  cursor: zoom-out;
  justify-content: center;
  align-items: center;
}

.lightbox.active {
  display: flex;
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: var(--radius-sm);
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 40px 24px;
  color: var(--text-dim);
  font-size: 0.85rem;
  border-top: 1px solid var(--border);
}

.footer-heart {
  color: var(--accent);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .hero-title { font-size: 2rem; }
  .hero-stats { gap: 24px; }
  .portraits-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .session-card { flex-direction: column; }
  .session-cover { width: 100%; height: 200px; }
  .nav-bar { overflow-x: auto; }
}

@media (max-width: 480px) {
  .portraits-grid { grid-template-columns: 1fr; }
  .hero-avatar { width: 140px; height: 140px; }
}

/* ===== View Transitions ===== */
.section { display: none; }
.section.active { display: block; }
</style>
</head>

// ===== PRIVATE MODE =====
const SECRET_CODE = 'nami0327';
let privateMode = localStorage.getItem('nami_private') === 'true';

function isPrivateSession(s) {
  return s.tagTypes && s.tagTypes.includes('private');
}

function isPrivatePortrait(p) {
  return false; // All portraits are public now
}

function getVisibleSessions() {
  if (privateMode) return DATA.sessions;
  return DATA.sessions.filter(s => !isPrivateSession(s));
}

function getVisiblePortraits() {
  if (privateMode) return DATA.portraits;
  return DATA.portraits.filter(p => !isPrivatePortrait(p));
}

function togglePrivateMode() {
  if (privateMode) {
    privateMode = false;
    localStorage.removeItem('nami_private');
    document.getElementById('lockToggle').textContent = '🔒';
    refreshAll();
  } else {
    const code = prompt('输入暗号解锁主人专属内容 💅');
    if (code === SECRET_CODE) {
      privateMode = true;
      localStorage.setItem('nami_private', 'true');
      document.getElementById('lockToggle').textContent = '🔓';
      refreshAll();
    } else if (code !== null) {
      alert('暗号错误！才不会让你看呢~ 😤');
    }
  }
}

function updateLockIcon() {
  document.getElementById('lockToggle').textContent = privateMode ? '🔓' : '🔒';
}

function refreshAll() {
  renderPortraits();
  renderSessions();
  renderTimeline();
  updateStats();
  updateLockIcon();
}

function updateStats() {
  const portraits = getVisiblePortraits();
  const sessions = getVisibleSessions();
  let totalPhotos = portraits.length;
  sessions.forEach(s => totalPhotos += s.chapters.length);
  document.getElementById('statPhotos').textContent = totalPhotos;
  document.getElementById('statSessions').textContent = sessions.length;
  document.getElementById('statStyles').textContent = privateMode ? 8 : 6;
}

// ===== INIT =====
function init() {
  // Avatar
  document.getElementById('heroAvatar').src = PHOTO_BASE + DATA.avatar;

  // Stats
  updateStats();
  updateLockIcon();

  // Particles
  createParticles();

  // Portraits
  renderPortraits();

  // Sessions
  renderSessions();

  // Timeline
  renderTimeline();

  // Nav
  setupNav();
}

function animateCounter(id, target) {
  const el = document.getElementById(id);
  let current = 0;
  const step = Math.ceil(target / 30);
  const interval = setInterval(() => {
    current += step;
    if (current >= target) {
      current = target;
      clearInterval(interval);
    }
    el.textContent = current;
  }, 40);
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 4 + 's';
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    if (Math.random() > 0.5) p.style.background = 'var(--accent)';
    container.appendChild(p);
  }
}

function renderPortraits() {
  const grid = document.getElementById('portraitsGrid');
  grid.innerHTML = '';
  getVisiblePortraits().forEach(p => {
    grid.innerHTML += `
      <div class="portrait-card" onclick="openLightbox('${PHOTO_BASE + p.src}')">
        <img src="${PHOTO_BASE + p.src}" alt="${p.name}" loading="lazy">
        <div class="portrait-label">
          ${p.name}
          <br><span class="portrait-tag ${p.tagClass}">${p.tag}</span>
        </div>
      </div>`;
  });
}

function renderSessions() {
  const list = document.getElementById('sessionsList');
  list.innerHTML = '';
  getVisibleSessions().forEach(s => {
    const tagsHtml = s.tags.map((t, i) =>
      `<span class="session-tag ${s.tagTypes[i]}">${t}</span>`
    ).join('');
    list.innerHTML += `
      <div class="session-card ${s.featured ? 'featured' : ''}" onclick="openGallery('${s.id}')">
        <img class="session-cover" src="${PHOTO_BASE + s.cover}" alt="${s.name}" loading="lazy">
        <div class="session-info">
          <div class="session-date">${s.date}</div>
          <div class="session-name">${s.name}</div>
          <div class="session-meta">${s.desc}</div>
          <div class="session-meta">${s.chapters.length} 章</div>
          <div class="session-tags">${tagsHtml}</div>
        </div>
      </div>`;
  });
}

function renderTimeline() {
  const container = document.getElementById('timelineContent');
  // Gather all photos with dates
  const items = [];
  getVisibleSessions().forEach(s => {
    s.chapters.forEach((ch, i) => {
      items.push({
        date: s.date,
        session: s.name,
        title: ch.title,
        img: ch.img,
        sessionId: s.id,
        idx: i
      });
    });
  });

  let html = '<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:16px;">';
  items.forEach(item => {
    html += `
      <div style="cursor:pointer; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); transition:all 0.3s;" 
           onclick="openLightbox('${PHOTO_BASE + item.img}')"
           onmouseenter="this.style.borderColor='var(--primary)';this.style.transform='translateY(-4px)'"
           onmouseleave="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <img src="${PHOTO_BASE + item.img}" alt="" style="width:100%;aspect-ratio:1;object-fit:cover;" loading="lazy">
        <div style="padding:10px;">
          <div style="font-size:0.75rem;color:var(--accent);">${item.date}</div>
          <div style="font-size:0.85rem;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.title}</div>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ===== NAV =====
function setupNav() {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.target;
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + target).classList.add('active');
    });
  });
}

// ===== GALLERY =====
function openGallery(sessionId) {
  const session = DATA.sessions.find(s => s.id === sessionId);
  if (!session) return;

  const container = document.getElementById('galleryContent');
  let html = `
    <div class="gallery-header">
      <h1>${session.name}</h1>
      <p>${session.desc}</p>
    </div>`;

  session.chapters.forEach((ch, i) => {
    html += `
      <div class="chapter" style="animation-delay: ${i * 0.1}s">
        <div class="chapter-img-wrapper">
          <img class="chapter-img" src="${PHOTO_BASE + ch.img}" alt="${ch.title}" 
               onclick="openLightbox('${PHOTO_BASE + ch.img}')" loading="lazy">
        </div>
        <div class="chapter-title">${ch.title}</div>
        <div class="chapter-text">${ch.text.replace(/\n/g, '<br>')}</div>
      </div>
      ${i < session.chapters.length - 1 ? '<div class="chapter-divider"></div>' : ''}`;
  });

  html += `
    <div style="text-align:center; margin-top:48px; color:var(--text-dim); font-style:italic;">
      — 完 —
    </div>`;

  container.innerHTML = html;
  document.getElementById('galleryOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Re-trigger animations
  setTimeout(() => {
    document.querySelectorAll('.chapter').forEach(ch => {
      ch.style.opacity = '1';
    });
  }, 100);
}

function closeGallery() {
  document.getElementById('galleryOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ===== LIGHTBOX =====
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
  event.stopPropagation();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    closeGallery();
  }
});

// ===== START =====
window.addEventListener('DOMContentLoaded', init);
</script>
